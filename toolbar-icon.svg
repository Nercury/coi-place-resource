<?xml version="1.0" encoding="UTF-8"?>
<!--
  Place / Fulfill toolbar icon.
  Top 1/3: inverted triangle (filled) symbolizing "placing onto terrain".
  Bottom 2/3: single arch (one mound) drawn as a stroked line, sculpt-terrain style.
  Color palette is white (#FFFFFF), matches every COI built-in toolbar icon. The game's UI theme
  tints automatically (hover, selected, disabled).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Inverted triangle, filled -->
  <polygon points="35,8 65,8 50,32" fill="#ffffff" />

  <!-- Single wave cycle: rises to peak, returns, dips to trough, returns. -->
  <path d="M 5,68 Q 27,40 50,68 Q 73,96 95,68"
        fill="none"
        stroke="#ffffff"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round" />
</svg>
